name: Setup Self-Hosted Runner

on:
  workflow_dispatch:

jobs:
  setup-runner:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup runner on VM
        env:
          GH_RUNNER_TOKEN: ${{ secrets.GH_RUNNER_TOKEN }}
        run: |
          set -eux
          
          # Pass token to VM via command substitution (Azure az vm run-command evaluates env vars)
          az vm run-command invoke \
            --resource-group MIKEO-LAB-INFRA-RG \
            --name vm-runner-mikeo-lab-infra \
            --command-id RunShellScript \
            --scripts "
          #!/bin/bash
          set -eux
          
          GH_TOKEN='${GH_RUNNER_TOKEN}'
          
          RUNNER_USER='runner'
          RUNNER_HOME=\"/home/\${RUNNER_USER}\"
          RUNNER_DIR=\"\${RUNNER_HOME}/actions-runner\"
          RUNNER_VERSION='2.327.1'
          RUNNER_NAME='vm-runner-mikeo-lab-infra'
          RUNNER_LABEL='wordgame-spoke'
          GITHUB_REPO='hoopdad/word-game'
          
          # Create runner user
          id \"\$RUNNER_USER\" >/dev/null 2>&1 || useradd --create-home --shell /bin/bash \"\$RUNNER_USER\"
          
          # Setup directory
          mkdir -p \"\$RUNNER_DIR\"
          chown -R \"\${RUNNER_USER}:\${RUNNER_USER}\" \"\$RUNNER_DIR\"
          cd \"\$RUNNER_DIR\"
          
          # Download runner
          ARCH=\$(uname -m | sed 's/x86_64/x64/; s/aarch64/arm64/')
          echo \"Downloading actions-runner-linux-\${ARCH}-\${RUNNER_VERSION}...\"
          curl --max-time 120 -fsSL -o actions-runner.tar.gz \"https://github.com/actions/runner/releases/download/v\${RUNNER_VERSION}/actions-runner-linux-\${ARCH}-\${RUNNER_VERSION}.tar.gz\"
          tar xzf actions-runner.tar.gz
          rm -f actions-runner.tar.gz
          
          # Get registration token
          echo 'Getting registration token...'
          REG_TOKEN=\$(curl --max-time 30 -fsSL -X POST \\
            -H \"Authorization: Bearer \${GH_TOKEN}\" \\
            -H \"Accept: application/vnd.github+json\" \\
            \"https://api.github.com/repos/\${GITHUB_REPO}/actions/runners/registration-token\" \\
            | grep -oP '\"token\"\\s*:\\s*\"\\K[^\"]+' | head -1)
          
          if [[ -z \"\$REG_TOKEN\" ]]; then
            echo 'Error: Failed to get registration token'
            exit 1
          fi
          
          # Configure runner
          echo 'Configuring runner...'
          sudo -u \"\$RUNNER_USER\" ./config.sh --unattended \\
            --url \"https://github.com/\${GITHUB_REPO}\" \\
            --token \"\$REG_TOKEN\" \\
            --name \"\$RUNNER_NAME\" \\
            --labels \"self-hosted,\${RUNNER_LABEL}\" \\
            --replace
          
          # Install and start service
          echo 'Installing systemd service...'
          ./svc.sh install \"\$RUNNER_USER\"
          ./svc.sh start
          
          echo '✓ Runner setup complete!'
          systemctl status actions-runner
          "
      
      - name: Verify runner registration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          
          # Check if runner is now online
          echo "Checking for online runner with label 'wordgame-spoke'..."
          
          for i in {1..30}; do
            RUNNER=$(gh api repos/hoopdad/word-game/actions/runners \
              --jq '.runners[] | select(any(.labels[]?; .name == "wordgame-spoke")) | select(.status == "online") | .name' \
              | head -n 1)
            
            if [[ -n "$RUNNER" ]]; then
              echo "✓ Runner online: $RUNNER"
              exit 0
            fi
            
            echo "[$i/30] Waiting for runner registration..."
            sleep 2
          done
          
          echo "⚠️ Runner not yet visible as online (may take a moment)"
          exit 0
