name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - "apps/**"
      - "packages/**"
      - "mcaps-infra/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on:
      - self-hosted
      - wordgame-spoke
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      infra: ${{ steps.filter.outputs.infra }}
      shared: ${{ steps.filter.outputs.shared }}
      tooling: ${{ steps.filter.outputs.tooling }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'
            agent:
              - 'apps/agent/**'
            infra:
              - 'mcaps-infra/**'
            shared:
              - 'packages/shared/**'
            tooling:
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'

  infra-validate:
    name: Infra validate
    runs-on:
      - self-hosted
      - wordgame-spoke
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install Terraform CLI (self-hosted bootstrap)
        run: |
          set -euo pipefail
          TF_VERSION="1.13.1"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) TF_ARCH="amd64" ;;
            aarch64) TF_ARCH="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          curl -fsSL -o /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_${TF_ARCH}.zip"
          python3 - <<'PY'
          import zipfile
          z=zipfile.ZipFile('/tmp/terraform.zip')
          z.extractall('/tmp')
          PY
          chmod +x /tmp/terraform
          /tmp/terraform version
      - name: Infra validate script
        run: PATH="/tmp:$PATH" scripts/ci-run.sh --target infra

  web-ci:
    name: Web lint/test/build
    runs-on:
      - self-hosted
      - wordgame-spoke
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: scripts/ci-run.sh --target web

  api-ci:
    name: API lint/test/build
    runs-on:
      - self-hosted
      - wordgame-spoke
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: scripts/ci-run.sh --target api

  agent-ci:
    name: Agent lint/test/build
    runs-on:
      - self-hosted
      - wordgame-spoke
    needs: detect-changes
    if: needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: scripts/ci-run.sh --target agent

  shared-ci:
    name: Shared lint/test/build
    runs-on:
      - self-hosted
      - wordgame-spoke
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: scripts/ci-run.sh --target shared
