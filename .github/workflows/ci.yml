name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "mcaps-infra/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      infra: ${{ steps.filter.outputs.infra }}
      shared: ${{ steps.filter.outputs.shared }}
      tooling: ${{ steps.filter.outputs.tooling }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'
            agent:
              - 'apps/agent/**'
            infra:
              - 'mcaps-infra/**'
            shared:
              - 'packages/shared/**'
            tooling:
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'

  infra-validate:
    name: Infra validate
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform -chdir=mcaps-infra fmt -recursive -check
      - name: Terraform init (no backend)
        run: terraform -chdir=mcaps-infra init -backend=false
      - name: Terraform validate
        run: terraform -chdir=mcaps-infra validate

  web-ci:
    name: Web lint/test/build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace @word-game/web run lint
      - run: npm --workspace @word-game/web run test
      - run: npm --workspace @word-game/web run build

  api-ci:
    name: API lint/test/build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace @word-game/api run lint
      - run: npm --workspace @word-game/api run test
      - run: npm --workspace @word-game/api run build

  agent-ci:
    name: Agent lint/test/build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace @word-game/agent run lint
      - run: npm --workspace @word-game/agent run test
      - run: npm --workspace @word-game/agent run build

  shared-ci:
    name: Shared lint/test/build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace @word-game/shared run lint
      - run: npm --workspace @word-game/shared run test
      - run: npm --workspace @word-game/shared run build
