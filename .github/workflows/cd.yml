name: CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "scripts/**"
      - ".github/workflows/cd.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region for deployment"
        required: false
        default: "centralus"
      deploy_web:
        description: "Deploy web service"
        required: false
        default: true
        type: boolean
      deploy_api:
        description: "Deploy api service"
        required: false
        default: true
        type: boolean
      deploy_agent:
        description: "Deploy agent service"
        required: false
        default: true
        type: boolean
      deploy_waf:
        description: "Deploy WAF service"
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'centralus' }}
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      waf: ${{ steps.filter.outputs.waf }}
      infra: ${{ steps.filter.outputs.infra }}
      shared: ${{ steps.filter.outputs.shared }}
      tooling: ${{ steps.filter.outputs.tooling }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'
            agent:
              - 'apps/agent/**'
            waf:
              - 'apps/waf/**'
            infra:
              - 'infra/**'
            shared:
              - 'packages/shared/**'
            tooling:
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'

  infra-deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || github.event_name == 'workflow_dispatch'
    outputs:
      resource_group: ${{ steps.tf_outputs.outputs.resource_group }}
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      web_app_name: ${{ steps.tf_outputs.outputs.web_app_name }}
      api_app_name: ${{ steps.tf_outputs.outputs.api_app_name }}
      agent_app_name: ${{ steps.tf_outputs.outputs.agent_app_name }}
      waf_app_name: ${{ steps.tf_outputs.outputs.waf_app_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Register required Azure resource providers
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          az provider register --namespace Microsoft.DocumentDB --wait
          az provider register --namespace Microsoft.Network --wait
          az provider register --namespace Microsoft.KeyVault --wait
          az provider register --namespace Microsoft.Storage --wait
          az provider register --namespace Microsoft.CognitiveServices --wait
      - name: Terraform init
        run: terraform -chdir=infra init
      - name: Terraform validate
        run: terraform -chdir=infra validate
      - name: Clean Terraform state and import existing resources
        run: |
          cd infra
          # Clear any cached state to force fresh import
          rm -rf .terraform/terraform.tfstate.* 2>/dev/null || true
          RG_NAME="rg-wordgame-dev"
          if az group show --name "$RG_NAME" >/dev/null 2>&1; then
            echo "Resource group $RG_NAME exists, importing into Terraform state..."
            terraform import -input=false "azurerm_resource_group.rg" "/subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/$RG_NAME" || true
          fi
          cd ..
      - name: Pre-create NSGs and VNet with subnets to satisfy Azure policy
        run: |
          RG_NAME="rg-wordgame-dev"
          LOCATION="${AZURE_LOCATION}"
          VNET_NAME="vnet-wordgame-dev"
           
          # Create VNet if it doesn't exist
          if ! az network vnet show --resource-group "$RG_NAME" --name "$VNET_NAME" 2>/dev/null; then
            echo "Creating VNet..."
            az network vnet create --resource-group "$RG_NAME" --name "$VNET_NAME" \
              --address-prefix "10.0.0.0/16" --location "$LOCATION"
          fi
           
          # Create NSGs
          for NSG_NAME in "nsg-waf-wordgame-dev" "nsg-aca-wordgame-dev" "nsg-pe-wordgame-dev" "nsg-mgmt-wordgame-dev"; do
            if ! az network nsg show --resource-group "$RG_NAME" --name "$NSG_NAME" 2>/dev/null; then
              echo "Creating NSG: $NSG_NAME"
              az network nsg create --resource-group "$RG_NAME" --name "$NSG_NAME" --location "$LOCATION"
            fi
          done
           
          # Create subnets with NSG associations to satisfy Azure policy
          declare -A SUBNETS=(
            ["snet-waf-wordgame-dev"]="10.0.1.0/24:nsg-waf-wordgame-dev"
            ["snet-aca-wordgame-dev"]="10.0.2.0/24:nsg-aca-wordgame-dev"
            ["snet-private-endpoints-wordgame-dev"]="10.0.3.0/24:nsg-pe-wordgame-dev"
            ["snet-management-wordgame-dev"]="10.0.4.0/24:nsg-mgmt-wordgame-dev"
          )
           
          for SUBNET_NAME in "${!SUBNETS[@]}"; do
            IFS=':' read -r SUBNET_PREFIX NSG_NAME <<< "${SUBNETS[$SUBNET_NAME]}"
            if ! az network vnet subnet show --resource-group "$RG_NAME" --vnet-name "$VNET_NAME" --name "$SUBNET_NAME" 2>/dev/null; then
              echo "Creating subnet: $SUBNET_NAME with NSG: $NSG_NAME"
              az network vnet subnet create --resource-group "$RG_NAME" --vnet-name "$VNET_NAME" \
                --name "$SUBNET_NAME" --address-prefix "$SUBNET_PREFIX" \
                --network-security-group "$NSG_NAME"
            fi
          done
      - name: Terraform apply
        run: |
          terraform -chdir=infra apply -auto-approve -input=false -var="location=${AZURE_LOCATION}" 2>&1 | tee /tmp/tf-apply.log || {
            EXIT_CODE=$?
            # Check if the failure is due to storage account auth (expected with key-based auth disabled)
            if grep -q "Key based authentication is not permitted" /tmp/tf-apply.log; then
              echo "Storage account verification failed (expected with key-based auth disabled). Validating deployment..."
              # Resource may still be created; verify with terraform show
              terraform -chdir=infra show -no-color 2>&1 | grep -q "azurerm_storage_account.artifacts" && {
                echo "Storage account exists in state; continuing..."
              } || {
                echo "Storage account creation failed; exiting..."
                exit $EXIT_CODE
              }
            else
              exit $EXIT_CODE
            fi
          }
      - id: tf_outputs
        name: Capture infra outputs
        run: |
          echo "resource_group=$(terraform -chdir=infra output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform -chdir=infra output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "web_app_name=$(terraform -chdir=infra output -json container_app_names | jq -r '.web')" >> "$GITHUB_OUTPUT"
          echo "api_app_name=$(terraform -chdir=infra output -json container_app_names | jq -r '.api')" >> "$GITHUB_OUTPUT"
          echo "agent_app_name=$(terraform -chdir=infra output -json container_app_names | jq -r '.agent')" >> "$GITHUB_OUTPUT"
          echo "waf_app_name=$(terraform -chdir=infra output -json container_app_names | jq -r '.waf')" >> "$GITHUB_OUTPUT"

  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - infra-deploy
    if: needs.infra-deploy.result == 'success' && (needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_web))
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade
      - name: Build and push web image
        env:
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_AUTHORITY: ${{ vars.VITE_ENTRA_AUTHORITY }}
          VITE_ENTRA_REDIRECT_URI: ${{ vars.VITE_ENTRA_REDIRECT_URI }}
          VITE_ENTRA_POST_LOGOUT_REDIRECT_URI: ${{ vars.VITE_ENTRA_POST_LOGOUT_REDIRECT_URI }}
          VITE_ENTRA_SCOPES: ${{ vars.VITE_ENTRA_SCOPES }}
        run: |
          az acr build \
            --registry "${ACR_LOGIN_SERVER%%.*}" \
            --image "web:${IMAGE_TAG}" \
            --file apps/web/Dockerfile \
            --build-arg VITE_ENTRA_CLIENT_ID="${VITE_ENTRA_CLIENT_ID}" \
            --build-arg VITE_ENTRA_AUTHORITY="${VITE_ENTRA_AUTHORITY}" \
            --build-arg VITE_ENTRA_REDIRECT_URI="${VITE_ENTRA_REDIRECT_URI}" \
            --build-arg VITE_ENTRA_POST_LOGOUT_REDIRECT_URI="${VITE_ENTRA_POST_LOGOUT_REDIRECT_URI}" \
            --build-arg VITE_ENTRA_SCOPES="${VITE_ENTRA_SCOPES}" \
            .
      - name: Configure web registry credentials
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.web_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
        run: |
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"
      - name: Update web container app
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.web_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/web:${IMAGE_TAG}"

  deploy-api:
    name: Deploy api app
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - infra-deploy
    if: needs.infra-deploy.result == 'success' && (needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_api))
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade
      - name: Build and push api image
        env:
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr build \
            --registry "${ACR_LOGIN_SERVER%%.*}" \
            --image "api:${IMAGE_TAG}" \
            --file apps/api/Dockerfile \
            .
      - name: Configure api registry credentials
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.api_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
        run: |
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"
      - name: Update api container app
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.api_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
          ENTRA_JWT_ISSUER: ${{ vars.ENTRA_JWT_ISSUER }}
          ENTRA_JWT_AUDIENCE: ${{ vars.ENTRA_JWT_AUDIENCE }}
          ENTRA_REQUIRED_SCOPE: ${{ vars.ENTRA_REQUIRED_SCOPE }}
          ENTRA_JWKS_URI: ${{ vars.ENTRA_JWKS_URI }}
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${ACR_LOGIN_SERVER}/api:${IMAGE_TAG}" \
            --set-env-vars \
            ENTRA_JWT_ISSUER="${ENTRA_JWT_ISSUER}" \
            ENTRA_JWT_AUDIENCE="${ENTRA_JWT_AUDIENCE}" \
            ENTRA_REQUIRED_SCOPE="${ENTRA_REQUIRED_SCOPE}" \
            ENTRA_JWKS_URI="${ENTRA_JWKS_URI}"

  deploy-agent:
    name: Deploy agent app
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - infra-deploy
    if: needs.infra-deploy.result == 'success' && (needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_agent))
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade
      - name: Build and push agent image
        env:
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr build \
            --registry "${ACR_LOGIN_SERVER%%.*}" \
            --image "agent:${IMAGE_TAG}" \
            --file apps/agent/Dockerfile \
            .
      - name: Configure agent registry credentials
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.agent_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
        run: |
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"
      - name: Update agent container app
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.agent_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/agent:${IMAGE_TAG}"

  deploy-waf:
    name: Deploy WAF app
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - infra-deploy
    if: needs.infra-deploy.result == 'success' && (needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_waf))
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade
      - name: Build and push WAF image
        env:
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr build \
            --registry "${ACR_LOGIN_SERVER%%.*}" \
            --image "waf:${IMAGE_TAG}" \
            --file apps/waf/Dockerfile \
            apps/waf
      - name: Configure WAF registry credentials
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.waf_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
        run: |
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"
      - name: Update WAF container app
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.waf_app_name }}
          ACR_LOGIN_SERVER: ${{ needs.infra-deploy.outputs.acr_login_server }}
          IMAGE_TAG: ${{ github.sha }}
        run: az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/waf:${IMAGE_TAG}"
