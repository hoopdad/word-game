name: CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "mcaps-infra/**"
      - "scripts/**"
      - ".github/workflows/cd.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region for deployment"
        required: false
        default: "centralus"
      deploy_web:
        description: "Deploy web service"
        required: false
        default: true
        type: boolean
      deploy_api:
        description: "Deploy api service"
        required: false
        default: true
        type: boolean
      deploy_agent:
        description: "Deploy agent service"
        required: false
        default: true
        type: boolean
      deploy_waf:
        description: "Deploy WAF service"
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AZURE_LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'centralus' }}
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_spoke_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_hub_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_github_runner_token: ${{ secrets.GH_RUNNER_TOKEN || '' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      waf: ${{ steps.filter.outputs.waf }}
      infra: ${{ steps.filter.outputs.infra }}
      shared: ${{ steps.filter.outputs.shared }}
      tooling: ${{ steps.filter.outputs.tooling }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'
            agent:
              - 'apps/agent/**'
            waf:
              - 'apps/waf/**'
            infra:
              - 'mcaps-infra/**'
            shared:
              - 'packages/shared/**'
            tooling:
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'

  infra-deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: wordgame-spoke-tfstate
      cancel-in-progress: false
    env:
      TF_STATE_RG: ${{ vars.TF_STATE_RG || 'mikeo-lab-tfstate-rg' }}
      TF_STATE_SA: ${{ vars.TF_STATE_SA }}
      TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER || 'tfstate' }}
      TF_STATE_KEY: wordgame-spoke.tfstate
    outputs:
      resource_group: ${{ steps.tf_outputs.outputs.resource_group }}
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      web_app_name: ${{ steps.tf_outputs.outputs.web_app_name }}
      api_app_name: ${{ steps.tf_outputs.outputs.api_app_name }}
      agent_app_name: ${{ steps.tf_outputs.outputs.agent_app_name }}
      waf_app_name: ${{ steps.tf_outputs.outputs.waf_app_name }}
      runner_vm_name: ${{ steps.tf_outputs.outputs.runner_vm_name }}
      runner_label: ${{ steps.tf_outputs.outputs.runner_label }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Validate state storage configuration
        run: |
          if [[ -z "${TF_STATE_SA}" ]]; then
            echo "Repository variable TF_STATE_SA (globally-unique storage account name) is required."
            exit 1
          fi
      - name: Register required Azure resource providers
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.Compute --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          az provider register --namespace Microsoft.DocumentDB --wait
          az provider register --namespace Microsoft.Network --wait
          az provider register --namespace Microsoft.KeyVault --wait
          az provider register --namespace Microsoft.Storage --wait
          az provider register --namespace Microsoft.CognitiveServices --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
      - name: Ensure Terraform state backend
        run: ./scripts/bootstrap-tfstate.sh
      - name: Terraform init
        run: |
          terraform -chdir=mcaps-infra init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RG}" \
            -backend-config="storage_account_name=${TF_STATE_SA}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_azuread_auth=true"
      - name: Terraform validate
        run: terraform -chdir=mcaps-infra validate
      - name: Break stale state lease (safe pre-apply)
        run: |
          set +e
          for BLOB_NAME in "tfstate/${TF_STATE_KEY}" "${TF_STATE_KEY}"; do
            echo "Attempting stale lease break for blob: ${BLOB_NAME}"
            az storage blob lease break \
              --account-name "${TF_STATE_SA}" \
              --container-name "${TF_STATE_CONTAINER}" \
              --blob-name "${BLOB_NAME}" \
              --auth-mode login
          done
          set -e
          sleep 10
      - name: Terraform apply
        run: |
          set -o pipefail
          terraform -chdir=mcaps-infra apply -auto-approve -input=false 2>&1 | tee /tmp/tf-apply.log
      - id: tf_outputs
        name: Capture infra outputs
        run: |
          RESOURCE_GROUP="$(terraform -chdir=mcaps-infra output -raw resource_group_name)"
          ACR_LOGIN_SERVER="$(terraform -chdir=mcaps-infra output -raw acr_login_server)"
          WEB_APP_NAME="$(terraform -chdir=mcaps-infra output -json container_app_names | jq -r '.web')"
          API_APP_NAME="$(terraform -chdir=mcaps-infra output -json container_app_names | jq -r '.api')"
          AGENT_APP_NAME="$(terraform -chdir=mcaps-infra output -json container_app_names | jq -r '.agent')"
          WAF_APP_NAME="$(terraform -chdir=mcaps-infra output -json container_app_names | jq -r '.waf')"
          RUNNER_VM_NAME="$(terraform -chdir=mcaps-infra output -raw runner_vm_name)"
          RUNNER_LABEL="$(terraform -chdir=mcaps-infra output -raw runner_label)"

          if [[ -z "$ACR_LOGIN_SERVER" || "$ACR_LOGIN_SERVER" == *"::error::"* || "$ACR_LOGIN_SERVER" != *.azurecr.io ]]; then
            echo "Invalid acr_login_server output: $ACR_LOGIN_SERVER"
            exit 1
          fi

          if [[ -z "$RUNNER_VM_NAME" || "$RUNNER_VM_NAME" == "null" ]]; then
            echo "runner_vm_name output is required when self-hosted runner is enabled."
            exit 1
          fi

          if [[ -z "$RUNNER_LABEL" || "$RUNNER_LABEL" == "null" ]]; then
            echo "runner_label output is required when self-hosted runner is enabled."
            exit 1
          fi

          echo "resource_group=${RESOURCE_GROUP}" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=${ACR_LOGIN_SERVER}" >> "$GITHUB_OUTPUT"
          echo "web_app_name=${WEB_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "api_app_name=${API_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "agent_app_name=${AGENT_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "waf_app_name=${WAF_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "runner_vm_name=${RUNNER_VM_NAME}" >> "$GITHUB_OUTPUT"
          echo "runner_label=${RUNNER_LABEL}" >> "$GITHUB_OUTPUT"

  runner-readiness:
    name: Verify self-hosted runner readiness
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - infra-deploy
    if: needs.infra-deploy.result == 'success' && (needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Check runner label online in repository
        env:
          GH_TOKEN: ${{ github.token }}
          RUNNER_LABEL: ${{ needs.infra-deploy.outputs.runner_label || 'wordgame-spoke' }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 120))
          while (( SECONDS < deadline )); do
            online_with_label_count="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" | jq -r --arg label "$RUNNER_LABEL" '[.runners[] | select(.status == "online" and any(.labels[]?; .name == $label))] | length')"
            if [[ "${online_with_label_count}" -gt 0 ]]; then
              echo "Found ${online_with_label_count} online runner(s) with label '${RUNNER_LABEL}'."
              exit 0
            fi

            echo "Waiting for an online self-hosted runner with label '${RUNNER_LABEL}'..."
            sleep 8
          done

          echo "::error::No online self-hosted runner with label '${RUNNER_LABEL}' was found within 120 seconds. Verify GH_RUNNER_TOKEN and runner registration."
          exit 1

  deploy-apps:
    name: Deploy apps
    runs-on:
      - self-hosted
      - wordgame-spoke
    needs:
      - detect-changes
      - infra-deploy
      - runner-readiness
    if: needs.infra-deploy.result == 'success' && needs.runner-readiness.result == 'success' && (needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade
      - name: Resolve ACR metadata
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          ACR_LOGIN_SERVER_OUTPUT: ${{ needs.infra-deploy.outputs.acr_login_server }}
        run: |
          ACR_NAME="$(az acr list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv)"
          if [[ -z "$ACR_NAME" || "$ACR_NAME" == "null" ]]; then
            ACR_NAME="${ACR_LOGIN_SERVER_OUTPUT%%.*}"
          fi
          if [[ ! "$ACR_NAME" =~ ^[a-zA-Z0-9]{5,50}$ ]]; then
            echo "Invalid ACR name resolved for deploy-apps: $ACR_NAME"
            exit 1
          fi
          ACR_LOGIN_SERVER="$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)"
          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
      - name: Docker login to ACR
        run: |
          ACR_PASS="$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)"
          echo "$ACR_PASS" | docker login "$ACR_LOGIN_SERVER" --username "$ACR_NAME" --password-stdin

      - name: Build and push web image
        if: needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
        env:
          IMAGE_TAG: ${{ github.sha }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_AUTHORITY: ${{ vars.VITE_ENTRA_AUTHORITY }}
          VITE_ENTRA_REDIRECT_URI: ${{ vars.VITE_ENTRA_REDIRECT_URI }}
          VITE_ENTRA_POST_LOGOUT_REDIRECT_URI: ${{ vars.VITE_ENTRA_POST_LOGOUT_REDIRECT_URI }}
          VITE_ENTRA_SCOPES: ${{ vars.VITE_ENTRA_SCOPES }}
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg VITE_ENTRA_CLIENT_ID="${VITE_ENTRA_CLIENT_ID}" \
            --build-arg VITE_ENTRA_AUTHORITY="${VITE_ENTRA_AUTHORITY}" \
            --build-arg VITE_ENTRA_REDIRECT_URI="${VITE_ENTRA_REDIRECT_URI}" \
            --build-arg VITE_ENTRA_POST_LOGOUT_REDIRECT_URI="${VITE_ENTRA_POST_LOGOUT_REDIRECT_URI}" \
            --build-arg VITE_ENTRA_SCOPES="${VITE_ENTRA_SCOPES}" \
            -t "${ACR_LOGIN_SERVER}/web:${IMAGE_TAG}" \
            .
          docker push "${ACR_LOGIN_SERVER}/web:${IMAGE_TAG}"

      - name: Build and push api image
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t "${ACR_LOGIN_SERVER}/api:${IMAGE_TAG}" .
          docker push "${ACR_LOGIN_SERVER}/api:${IMAGE_TAG}"

      - name: Build and push agent image
        if: needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_agent)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/agent/Dockerfile -t "${ACR_LOGIN_SERVER}/agent:${IMAGE_TAG}" .
          docker push "${ACR_LOGIN_SERVER}/agent:${IMAGE_TAG}"

      - name: Build and push WAF image
        if: needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_waf)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/waf/Dockerfile -t "${ACR_LOGIN_SERVER}/waf:${IMAGE_TAG}" apps/waf
          docker push "${ACR_LOGIN_SERVER}/waf:${IMAGE_TAG}"

      - name: Configure web registry credentials
        if: needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.web_app_name }}
        run: |
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"

      - name: Update web container app
        if: needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.web_app_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/web:${IMAGE_TAG}"

      - name: Configure api registry credentials
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.api_app_name }}
        run: |
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"

      - name: Update api container app
        if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.api_app_name }}
          IMAGE_TAG: ${{ github.sha }}
          ENTRA_JWT_ISSUER: ${{ vars.ENTRA_JWT_ISSUER }}
          ENTRA_JWT_AUDIENCE: ${{ vars.ENTRA_JWT_AUDIENCE }}
          ENTRA_REQUIRED_SCOPE: ${{ vars.ENTRA_REQUIRED_SCOPE }}
          ENTRA_JWKS_URI: ${{ vars.ENTRA_JWKS_URI }}
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${ACR_LOGIN_SERVER}/api:${IMAGE_TAG}" \
            --set-env-vars \
            ENTRA_JWT_ISSUER="${ENTRA_JWT_ISSUER}" \
            ENTRA_JWT_AUDIENCE="${ENTRA_JWT_AUDIENCE}" \
            ENTRA_REQUIRED_SCOPE="${ENTRA_REQUIRED_SCOPE}" \
            ENTRA_JWKS_URI="${ENTRA_JWKS_URI}"

      - name: Configure agent registry credentials
        if: needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_agent)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.agent_app_name }}
        run: |
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"

      - name: Update agent container app
        if: needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_agent)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.agent_app_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/agent:${IMAGE_TAG}"

      - name: Configure WAF registry credentials
        if: needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_waf)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.waf_app_name }}
        run: |
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"

      - name: Update WAF container app
        if: needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_waf)
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.waf_app_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/waf:${IMAGE_TAG}"

  stop-runner:
    name: Stop runner VM
    runs-on: ubuntu-latest
    needs:
      - infra-deploy
      - deploy-apps
    # Disabled at user request: keep the self-hosted runner VM running between
    # CD invocations to speed up iteration. Re-enable by removing the `false &&`
    # guard (or set repo variable RUNNER_AUTO_DEALLOCATE to switch on later).
    if: false && always()
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deallocate runner VM
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          VM_NAME: ${{ needs.infra-deploy.outputs.runner_vm_name }}
        run: |
          if [[ -z "$VM_NAME" || "$VM_NAME" == "null" ]]; then
            echo "No VM name; skipping deallocate."
            exit 0
          fi
          echo "Deallocating ${VM_NAME}..."
          az vm deallocate --resource-group "$RESOURCE_GROUP" --name "$VM_NAME" --no-wait
          echo "Deallocation triggered."
