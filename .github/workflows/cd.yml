name: CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "scripts/**"
      - ".github/workflows/cd.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region for deployment"
        required: false
        default: "centralus"
      deploy_web:
        description: "Deploy web service"
        required: false
        default: true
        type: boolean
      deploy_api:
        description: "Deploy api service"
        required: false
        default: true
        type: boolean
      deploy_agent:
        description: "Deploy agent service"
        required: false
        default: true
        type: boolean
      deploy_waf:
        description: "Deploy WAF service"
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'centralus' }}
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      waf: ${{ steps.filter.outputs.waf }}
      infra: ${{ steps.filter.outputs.infra }}
      shared: ${{ steps.filter.outputs.shared }}
      tooling: ${{ steps.filter.outputs.tooling }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'
            agent:
              - 'apps/agent/**'
            waf:
              - 'apps/waf/**'
            infra:
              - 'infra/**'
            shared:
              - 'packages/shared/**'
            tooling:
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'

  infra-deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || github.event_name == 'workflow_dispatch'
    outputs:
      resource_group: ${{ steps.tf_outputs.outputs.resource_group }}
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      web_app_name: ${{ steps.tf_outputs.outputs.web_app_name }}
      api_app_name: ${{ steps.tf_outputs.outputs.api_app_name }}
      agent_app_name: ${{ steps.tf_outputs.outputs.agent_app_name }}
      waf_app_name: ${{ steps.tf_outputs.outputs.waf_app_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Register required Azure resource providers
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          az provider register --namespace Microsoft.DocumentDB --wait
          az provider register --namespace Microsoft.Network --wait
          az provider register --namespace Microsoft.KeyVault --wait
          az provider register --namespace Microsoft.Storage --wait
          az provider register --namespace Microsoft.CognitiveServices --wait
      - name: Terraform init
        run: terraform -chdir=infra init
      - name: Terraform validate
        run: terraform -chdir=infra validate
      - name: Clean Terraform state and import existing resources
        run: |
          cd infra
          # Clear any cached state to force fresh import
          rm -rf .terraform/terraform.tfstate.* 2>/dev/null || true
          SUBSCRIPTION_ID="$ARM_SUBSCRIPTION_ID"
          RG_NAME="rg-wordgame-dev"
          BASE_NAME="wordgame-dev"
          VNET_NAME="vnet-${BASE_NAME}"
          ACR_NAME="acrwordgamedev"
          COSMOS_NAME="wordgamedevcosmos"
          KV_NAME="kvwordgamedev"
          STORAGE_NAME="stwordgamedev"
          LAW_NAME="law-${BASE_NAME}"
          IDENTITY_NAME="id-${BASE_NAME}"
          CAE_NAME="cae-${BASE_NAME}"
          WAF_CAE_NAME="cae-waf-${BASE_NAME}"
          CA_WEB_NAME="ca-web-${BASE_NAME}"
          CA_API_NAME="ca-api-${BASE_NAME}"
          CA_AGENT_NAME="ca-agent-${BASE_NAME}"
          CA_WAF_NAME="ca-waf-${BASE_NAME}"
          ACA_INTERNAL_ZONE="$(az containerapp env show --name "${CAE_NAME}" --resource-group "${RG_NAME}" --query properties.defaultDomain -o tsv)"

          tf_import() {
            local addr="$1"
            local id="$2"
            terraform import -input=false "$addr" "$id" >/dev/null 2>&1 || true
          }

          if az group show --name "$RG_NAME" >/dev/null 2>&1; then
            echo "Resource group $RG_NAME exists, importing known resources into Terraform state..."
            tf_import "azurerm_resource_group.rg" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}"
            tf_import "azurerm_log_analytics_workspace.aca_logs" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.OperationalInsights/workspaces/${LAW_NAME}"
            tf_import "azurerm_user_assigned_identity.workload" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/${IDENTITY_NAME}"
            tf_import "azurerm_container_registry.acr" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ContainerRegistry/registries/${ACR_NAME}"
            tf_import "azurerm_cosmosdb_account.cosmos" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.DocumentDB/databaseAccounts/${COSMOS_NAME}"
            tf_import "azurerm_cosmosdb_sql_database.app" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.DocumentDB/databaseAccounts/${COSMOS_NAME}/sqlDatabases/wordgame-db"
            tf_import "azurerm_cosmosdb_sql_container.events" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.DocumentDB/databaseAccounts/${COSMOS_NAME}/sqlDatabases/wordgame-db/containers/game-events"
            tf_import "azurerm_storage_account.artifacts" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Storage/storageAccounts/${STORAGE_NAME}"
            tf_import "azurerm_key_vault.secrets" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.KeyVault/vaults/${KV_NAME}"
            tf_import "azurerm_virtual_network.platform" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}"
            tf_import "azurerm_network_security_group.waf" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-waf-${BASE_NAME}"
            tf_import "azurerm_network_security_group.aca" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}"
            tf_import "azurerm_network_security_group.private_endpoints" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-pe-${BASE_NAME}"
            tf_import "azurerm_network_security_group.management" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-mgmt-${BASE_NAME}"
            tf_import "azurerm_network_security_rule.waf_allow_http" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-waf-${BASE_NAME}/securityRules/Allow-HTTP-HTTPS"
            tf_import "azurerm_network_security_rule.waf_allow_lb" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-waf-${BASE_NAME}/securityRules/Allow-AzureLoadBalancer"
            tf_import "azurerm_network_security_rule.waf_deny_all" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-waf-${BASE_NAME}/securityRules/Deny-All"
            tf_import "azurerm_network_security_rule.aca_allow_waf" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}/securityRules/Allow-From-WAF"
            tf_import "azurerm_network_security_rule.aca_allow_lb" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}/securityRules/Allow-AzureLoadBalancer"
            tf_import "azurerm_network_security_rule.aca_deny_all" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}/securityRules/Deny-All"
            tf_import "azurerm_network_security_rule.aca_allow_vnet_outbound" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}/securityRules/Allow-VNet-Outbound"
            tf_import "azurerm_network_security_rule.aca_allow_https_outbound" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}/securityRules/Allow-HTTPS-Outbound"
            tf_import "azurerm_network_security_rule.aca_allow_dns_outbound" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}/securityRules/Allow-DNS-Outbound"
            tf_import "azurerm_network_security_rule.pe_allow_vnet" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-pe-${BASE_NAME}/securityRules/Allow-VNet"
            tf_import "azurerm_network_security_rule.pe_allow_vnet_outbound" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-pe-${BASE_NAME}/securityRules/Allow-VNet-Outbound"
            tf_import "azurerm_network_security_rule.pe_deny_internet_outbound" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-pe-${BASE_NAME}/securityRules/Deny-Internet-Outbound"
            tf_import "azurerm_network_security_rule.pe_deny_all" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-pe-${BASE_NAME}/securityRules/Deny-All"
            tf_import "azurerm_network_security_rule.mgmt_deny_all" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-mgmt-${BASE_NAME}/securityRules/Deny-All"
            tf_import "azurerm_subnet.waf" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-waf-${BASE_NAME}"
            tf_import "azurerm_subnet.aca" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-aca-${BASE_NAME}"
            tf_import "azurerm_subnet.private_endpoints" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-private-endpoints-${BASE_NAME}"
            tf_import "azurerm_subnet.management" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-management-${BASE_NAME}"
            tf_import "azurerm_subnet_network_security_group_association.waf" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-waf-${BASE_NAME}|/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-waf-${BASE_NAME}"
            tf_import "azurerm_subnet_network_security_group_association.aca" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-aca-${BASE_NAME}|/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-aca-${BASE_NAME}"
            tf_import "azurerm_subnet_network_security_group_association.private_endpoints" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-private-endpoints-${BASE_NAME}|/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-pe-${BASE_NAME}"
            tf_import "azurerm_subnet_network_security_group_association.management" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/snet-management-${BASE_NAME}|/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/networkSecurityGroups/nsg-mgmt-${BASE_NAME}"
            tf_import "azurerm_private_dns_zone.acr" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.azurecr.io"
            tf_import "azurerm_private_dns_zone.cosmos" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.documents.azure.com"
            tf_import "azurerm_private_dns_zone.key_vault" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.vaultcore.azure.net"
            tf_import "azurerm_private_dns_zone.blob" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.blob.core.windows.net"
            tf_import "azurerm_private_dns_zone.aca_internal" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/${ACA_INTERNAL_ZONE}"
            tf_import "azurerm_private_dns_zone_virtual_network_link.acr" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.azurecr.io/virtualNetworkLinks/link-acr-${BASE_NAME}"
            tf_import "azurerm_private_dns_zone_virtual_network_link.cosmos" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.documents.azure.com/virtualNetworkLinks/link-cosmos-${BASE_NAME}"
            tf_import "azurerm_private_dns_zone_virtual_network_link.key_vault" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.vaultcore.azure.net/virtualNetworkLinks/link-kv-${BASE_NAME}"
            tf_import "azurerm_private_dns_zone_virtual_network_link.blob" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/privatelink.blob.core.windows.net/virtualNetworkLinks/link-blob-${BASE_NAME}"
            tf_import "azurerm_private_dns_zone_virtual_network_link.aca_internal" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/${ACA_INTERNAL_ZONE}/virtualNetworkLinks/link-aca-${BASE_NAME}"
            tf_import "azurerm_private_dns_a_record.aca_internal_wildcard" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateDnsZones/${ACA_INTERNAL_ZONE}/A/*"
            tf_import "azurerm_private_endpoint.acr" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateEndpoints/pe-acr-${BASE_NAME}"
            tf_import "azurerm_private_endpoint.cosmos" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateEndpoints/pe-cosmos-${BASE_NAME}"
            tf_import "azurerm_private_endpoint.key_vault" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateEndpoints/pe-kv-${BASE_NAME}"
            tf_import "azurerm_private_endpoint.blob" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Network/privateEndpoints/pe-blob-${BASE_NAME}"
            tf_import "azurerm_container_app_environment.aca_env" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/managedEnvironments/${CAE_NAME}"
            tf_import "azurerm_container_app_environment.waf_env" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/managedEnvironments/${WAF_CAE_NAME}"
            tf_import "azurerm_container_app.web" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${CA_WEB_NAME}"
            tf_import "azurerm_container_app.api" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${CA_API_NAME}"
            tf_import "azurerm_container_app.agent" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${CA_AGENT_NAME}"
            tf_import "azurerm_container_app.waf" "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.App/containerApps/${CA_WAF_NAME}"
          fi
          cd ..
      - name: Pre-create NSGs and VNet with subnets to satisfy Azure policy
        run: |
          RG_NAME="rg-wordgame-dev"
          LOCATION="${AZURE_LOCATION}"
          VNET_NAME="vnet-wordgame-dev"
           
          # Create VNet if it doesn't exist
          if ! az network vnet show --resource-group "$RG_NAME" --name "$VNET_NAME" 2>/dev/null; then
            echo "Creating VNet..."
            az network vnet create --resource-group "$RG_NAME" --name "$VNET_NAME" \
              --address-prefix "10.0.0.0/16" --location "$LOCATION"
          fi
           
          # Create NSGs
          for NSG_NAME in "nsg-waf-wordgame-dev" "nsg-aca-wordgame-dev" "nsg-pe-wordgame-dev" "nsg-mgmt-wordgame-dev"; do
            if ! az network nsg show --resource-group "$RG_NAME" --name "$NSG_NAME" 2>/dev/null; then
              echo "Creating NSG: $NSG_NAME"
              az network nsg create --resource-group "$RG_NAME" --name "$NSG_NAME" --location "$LOCATION"
            fi
          done
           
          # Create subnets with NSG associations to satisfy Azure policy
          declare -A SUBNETS=(
            ["snet-waf-wordgame-dev"]="10.0.1.0/24:nsg-waf-wordgame-dev"
            ["snet-aca-wordgame-dev"]="10.0.2.0/24:nsg-aca-wordgame-dev"
            ["snet-private-endpoints-wordgame-dev"]="10.0.3.0/24:nsg-pe-wordgame-dev"
            ["snet-management-wordgame-dev"]="10.0.4.0/24:nsg-mgmt-wordgame-dev"
          )
           
          for SUBNET_NAME in "${!SUBNETS[@]}"; do
            IFS=':' read -r SUBNET_PREFIX NSG_NAME <<< "${SUBNETS[$SUBNET_NAME]}"
            if ! az network vnet subnet show --resource-group "$RG_NAME" --vnet-name "$VNET_NAME" --name "$SUBNET_NAME" 2>/dev/null; then
              echo "Creating subnet: $SUBNET_NAME with NSG: $NSG_NAME"
              az network vnet subnet create --resource-group "$RG_NAME" --vnet-name "$VNET_NAME" \
                --name "$SUBNET_NAME" --address-prefix "$SUBNET_PREFIX" \
                --network-security-group "$NSG_NAME"
            fi
          done
      - name: Terraform apply
        run: |
          set -o pipefail
          terraform -chdir=infra apply -auto-approve -input=false -var="location=${AZURE_LOCATION}" 2>&1 | tee /tmp/tf-apply.log
      - id: tf_outputs
        name: Capture infra outputs
        run: |
          RESOURCE_GROUP="$(terraform -chdir=infra output -raw resource_group_name)"
          ACR_LOGIN_SERVER="$(terraform -chdir=infra output -raw acr_login_server)"
          WEB_APP_NAME="$(terraform -chdir=infra output -json container_app_names | jq -r '.web')"
          API_APP_NAME="$(terraform -chdir=infra output -json container_app_names | jq -r '.api')"
          AGENT_APP_NAME="$(terraform -chdir=infra output -json container_app_names | jq -r '.agent')"
          WAF_APP_NAME="$(terraform -chdir=infra output -json container_app_names | jq -r '.waf')"

          if [[ -z "$ACR_LOGIN_SERVER" || "$ACR_LOGIN_SERVER" == *"::error::"* || "$ACR_LOGIN_SERVER" != *.azurecr.io ]]; then
            echo "Invalid acr_login_server output: $ACR_LOGIN_SERVER"
            exit 1
          fi

          echo "resource_group=${RESOURCE_GROUP}" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=${ACR_LOGIN_SERVER}" >> "$GITHUB_OUTPUT"
          echo "web_app_name=${WEB_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "api_app_name=${API_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "agent_app_name=${AGENT_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "waf_app_name=${WAF_APP_NAME}" >> "$GITHUB_OUTPUT"

  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - infra-deploy
    if: needs.infra-deploy.result == 'success' && (needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_web))
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade
      - name: Resolve ACR metadata
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          ACR_LOGIN_SERVER_OUTPUT: ${{ needs.infra-deploy.outputs.acr_login_server }}
        run: |
          ACR_NAME="$(az acr list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv)"
          if [[ -z "$ACR_NAME" || "$ACR_NAME" == "null" ]]; then
            ACR_NAME="${ACR_LOGIN_SERVER_OUTPUT%%.*}"
          fi
          if [[ ! "$ACR_NAME" =~ ^[a-zA-Z0-9]{5,50}$ ]]; then
            echo "Invalid ACR name resolved for deploy-web: $ACR_NAME"
            exit 1
          fi
          ACR_LOGIN_SERVER="$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)"
          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
      - name: Build and push web image
        env:
          IMAGE_TAG: ${{ github.sha }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_AUTHORITY: ${{ vars.VITE_ENTRA_AUTHORITY }}
          VITE_ENTRA_REDIRECT_URI: ${{ vars.VITE_ENTRA_REDIRECT_URI }}
          VITE_ENTRA_POST_LOGOUT_REDIRECT_URI: ${{ vars.VITE_ENTRA_POST_LOGOUT_REDIRECT_URI }}
          VITE_ENTRA_SCOPES: ${{ vars.VITE_ENTRA_SCOPES }}
        run: |
          az acr build \
            --registry "${ACR_NAME}" \
            --image "web:${IMAGE_TAG}" \
            --file apps/web/Dockerfile \
            --build-arg VITE_ENTRA_CLIENT_ID="${VITE_ENTRA_CLIENT_ID}" \
            --build-arg VITE_ENTRA_AUTHORITY="${VITE_ENTRA_AUTHORITY}" \
            --build-arg VITE_ENTRA_REDIRECT_URI="${VITE_ENTRA_REDIRECT_URI}" \
            --build-arg VITE_ENTRA_POST_LOGOUT_REDIRECT_URI="${VITE_ENTRA_POST_LOGOUT_REDIRECT_URI}" \
            --build-arg VITE_ENTRA_SCOPES="${VITE_ENTRA_SCOPES}" \
            .
      - name: Configure web registry credentials
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.web_app_name }}
        run: |
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"
      - name: Update web container app
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.web_app_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/web:${IMAGE_TAG}"

  deploy-api:
    name: Deploy api app
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - infra-deploy
    if: needs.infra-deploy.result == 'success' && (needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.waf == 'true' || needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.tooling == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_api))
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade
      - name: Resolve ACR metadata
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          ACR_LOGIN_SERVER_OUTPUT: ${{ needs.infra-deploy.outputs.acr_login_server }}
        run: |
          ACR_NAME="$(az acr list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv)"
          if [[ -z "$ACR_NAME" || "$ACR_NAME" == "null" ]]; then
            ACR_NAME="${ACR_LOGIN_SERVER_OUTPUT%%.*}"
          fi
          if [[ ! "$ACR_NAME" =~ ^[a-zA-Z0-9]{5,50}$ ]]; then
            echo "Invalid ACR name resolved for deploy-api: $ACR_NAME"
            exit 1
          fi
          ACR_LOGIN_SERVER="$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)"
          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
      - name: Build and push api image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr build \
            --registry "${ACR_NAME}" \
            --image "api:${IMAGE_TAG}" \
            --file apps/api/Dockerfile \
            .
      - name: Configure api registry credentials
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.api_app_name }}
        run: |
          ACR_USERNAME="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"
          az containerapp registry set --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --server "$ACR_LOGIN_SERVER" --username "$ACR_USERNAME" --password "$ACR_PASSWORD"
      - name: Update api container app
        env:
          RESOURCE_GROUP: ${{ needs.infra-deploy.outputs.resource_group }}
          CONTAINER_APP_NAME: ${{ needs.infra-deploy.outputs.api_app_name }}
          IMAGE_TAG: ${{ github.sha }}
          ENTRA_JWT_ISSUER: ${{ vars.ENTRA_JWT_ISSUER }}
          ENTRA_JWT_AUDIENCE: ${{ vars.ENTRA_JWT_AUDIENCE }}
          ENTRA_REQUIRED_SCOPE: ${{ vars.ENTRA_REQUIRED_SCOPE }}
          ENTRA_JWKS_URI: ${{ vars.ENTRA_JWKS_URI }}
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${ACR_LOGIN_SERVER}/api:${IMAGE_TAG}" \
            --set-env-vars \
            ENTRA_JWT_ISSUER="${ENTRA_JWT_ISSUER}" \
            ENTRA_JWT_AUDIENCE="${ENTRA_JWT_AUDIENCE}" \
            ENTRA_REQUIRED_SCOPE="${ENTRA_REQUIRED_SCOPE}" \
            ENTRA_JWKS_URI="${ENTRA_JWKS_URI}"

