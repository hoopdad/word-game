name: Destroy legacy infra

# Manual, gated teardown of the legacy standalone stack (resource group
# rg-wordgame-dev). The legacy stack used ephemeral local Terraform state, so
# teardown is a resource-group delete rather than `terraform destroy`.

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Resource group to delete"
        required: true
        default: "rg-wordgame-dev"
      confirm:
        description: "Type DESTROY to confirm"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Destroy legacy resource group
    runs-on: ubuntu-latest
    # Requires a GitHub Environment named "destroy-legacy" with required
    # reviewers configured for a manual approval gate.
    environment: destroy-legacy
    steps:
      - name: Validate confirmation
        run: |
          if [[ "${{ inputs.confirm }}" != "DESTROY" ]]; then
            echo "Confirmation text did not match 'DESTROY'. Aborting."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Destroy legacy resource group
        run: ./scripts/destroy-old-infra.sh --yes --rg="${{ inputs.resource_group }}"
