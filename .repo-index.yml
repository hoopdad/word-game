# Child repository index for orchestrator + specialists
# local_path may be relative to this parent repo or absolute.
repos:
  - name: "word-game-waf"
    role: "waf"
    local_path: "../word-game-waf"
    visibility: "private"
    description: "Web Application Firewall. Public IP, filters with OWASP CRS and routes to web, api, and agent"
    remote_url: "https://github.com/hoopdad/word-game-waf.git"
    default_branch: "main"
  - name: "word-game-web"
    role: "frontend"
    local_path: "../word-game-web"
    visibility: "private"
    description: "React/TypeScript SPA with MSAL auth"
    remote_url: "https://github.com/hoopdad/word-game-web.git"
    default_branch: "main"
  - name: "word-game-api"
    role: "backend"
    local_path: "../word-game-api"
    visibility: "private"
    description: "Python/FastAPI REST API with Azure SDK"
    remote_url: "https://github.com/hoopdad/word-game-api.git"
    default_branch: "main"
  - name: "word-game-agent"
    role: "agent"
    local_path: "../word-game-agent"
    visibility: "private"
    description: "Python AI agent service using Microsoft Agent Framework that uses a Foundry Client for analytical or decision-making functions. See https://github.com/microsoft/agent-framework"
    remote_url: "https://github.com/hoopdad/word-game-agent.git"
    default_branch: "main"
  - name: "word-game-infra"
    role: "infra"
    local_path: "../word-game-infra"
    visibility: "private"
    description: "Terraform IaC for Azure (ACA, Cosmos, Entra, Foundry, GPT-4.1-mini or higher equivalent, networking)"
    remote_url: "https://github.com/hoopdad/word-game-infra.git"
    default_branch: "main"
