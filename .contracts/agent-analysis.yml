# BOOTSTRAP contract — derived from .copilot/topology.md request flow:
#   POST /agent/* → WAF (:443) → word-game-agent (:8000)
# and the repo description: "Python AI agent using Microsoft Agent Framework + Foundry
# Client (GPT-4.1-mini or higher) for analytical or decision-making functions."
# The agent is a stateless decision/analysis service. Primary consumer is the API
# (server-side orchestration of game logic); the WAF also exposes /agent/* publicly, so
# the web SPA can reach it through the gateway. Greenfield at bootstrap — intended shape.
name: "agent-analysis"
type: "REST"
provider: "word-game-agent"
consumers:
  - "word-game-api"
  - "word-game-web"
auth: "Bearer JWT (Entra External ID) — validated at the WAF/agent boundary"
notes: >
  Decisions are backed by an Azure AI Foundry model client. Endpoints are idempotent and
  hold no game state; the authoritative game state lives in word-game-api / Cosmos DB.
endpoints:
  - method: "GET"
    path: "/agent/health"
    auth: false
    request: {}
    response:
      200: { status: "string" }

  - method: "POST"
    path: "/agent/generate-categories"
    description: >
      Generate one category per player from the configured websites. Visits the given websites
      IN PARALLEL, extracts domain-specific words / 2-3 word phrases (excludes generic standalone
      words like articles/prepositions, though they may appear inside a phrase). SSRF-guarded
      (scheme/host/IP allowlist, bounded size + timeout). Hard 30s cap with a sensible default-
      category fallback so the caller is never blocked.
    request:
      websites: { type: "array", required: true }     # [string] URLs from category_config
      player_count: { type: "integer", required: true } # one category per player
    response:
      200:
        categories: "array"   # [{ name: string, words: [string] }] length == player_count
        used_fallback: "boolean"
      422: { error: "string", field: "string" }

  - method: "POST"
    path: "/agent/generate-word"
    description: "Pick/generate the secret word (optionally with difficulty) at game start."
    request:
      difficulty: { type: "string", required: false }   # easy | medium | hard
    response:
      200: { word: "string", category: "string" }
      422: { error: "string", field: "string" }

  - method: "POST"
    path: "/agent/evaluate-guess"
    description: "Semantic judge of whether a guess matches the target word."
    request:
      guess: { type: "string", required: true }
      target: { type: "string", required: true }
    response:
      200: { is_correct: "boolean", confidence: "number" }
      422: { error: "string", field: "string" }

  - method: "POST"
    path: "/agent/score-clue"
    description: "Validate a clue — detect if it leaks the target word or is off-topic."
    request:
      clue: { type: "string", required: true }
      target: { type: "string", required: true }
    response:
      200: { valid: "boolean", reason: "string" }
      422: { error: "string", field: "string" }
