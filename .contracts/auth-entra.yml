# BOOTSTRAP contract — derived from .copilot/topology.md "Entra ID Configuration" +
# "Common Mistakes" and the web repo description (MSAL auth). Defines the shared auth
# handshake between the SPA and the API. App registrations are provisioned by the infra
# repo (Terraform / Entra External ID). Greenfield at bootstrap — intended shape.
name: "auth-entra"
type: "Shared-Model"
provider: "word-game-infra"        # provisions Entra External ID app registrations
consumers:
  - "word-game-web"                # MSAL browser auth (acquires token)
  - "word-game-api"                # validates JWT bearer token
identity_provider: "Entra External ID"
flow: "MSAL SPA (Authorization Code + PKCE) — acquireTokenPopup (never acquireTokenRedirect)"
scope: "api://<api-client-id>/access_as_user"
token:
  type: "JWT (v2.0)"
  transport: "Authorization: Bearer <token> header on /api/*; on connect for /ws/*"
  audience: "<api-client-id>"
  issuer: "https://login.microsoftonline.com/<tenant-id>/v2.0"
  validated_by: "word-game-api"
claims:
  sub: { type: "string", desc: "stable user id — used as player identity key" }
  oid: { type: "string", desc: "Entra object id" }
  name: { type: "string", desc: "display name" }
  scp: { type: "string", desc: "must contain access_as_user" }
web_config:
  redirect_uri: "window.location.origin + '/welcome' at runtime (NOT a VITE_* env var)"
  build_note: "VITE_* values must be ARG->ENV before 'npm run build' in the Dockerfile"
api_responses:
  401: { error: "string" }         # missing/invalid/expired token
  403: { error: "string" }         # valid token, insufficient scope/role
