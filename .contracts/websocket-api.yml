name: "websocket-api"
type: "WebSocket"
provider: "word-game-api"
consumers:
  - "word-game-web"

connection:
  path: "/ws"
  auth: "JWT token passed as query parameter or first message"
  protocol: "JSON messages over WebSocket"

# Client → Server Messages
client_events:
  - event: "join"
    description: "User joins the lobby after setting display name"
    payload:
      display_name: { type: "string", required: true }

  - event: "start_game"
    description: "Any user starts a game"
    payload: {}

  - event: "start_round"
    description: "Start first round or next round (from category overview)"
    payload: {}

  - event: "submit_guess"
    description: "Guesser submits a guess"
    payload:
      guess: { type: "string", required: true }

  - event: "judge_correct"
    description: "Clue-giver judges the current guess as correct"
    payload: {}

# Server → Client Messages
server_events:
  - event: "user_joined"
    description: "A user has connected to the lobby"
    payload:
      user_id: "string"
      display_name: "string"
      active_users: [{ id: "string", display_name: "string" }]

  - event: "user_left"
    description: "A user has disconnected"
    payload:
      user_id: "string"
      active_users: [{ id: "string", display_name: "string" }]

  # NOTE: Server emits FLAT messages: { "type": "<event>", ...payload }.
  # The web client dispatches on `type` and spreads the remaining fields as payload.
  - event: "game_started"
    description: "A game has been started; all connected clients should navigate to the game screen"
    payload:
      game_id: "string"
      status: "gathering_categories"

  - event: "round_starting"
    description: "Countdown to a round has begun; drives the role + countdown screen"
    payload:
      round_number: "integer"
      guesser_id: "string"
      guesser_name: "string"
      category: "string"
      countdown_remaining: "integer"
      status: "countdown"

  - event: "countdown_tick"
    description: "Countdown timer tick"
    payload:
      remaining: "integer"

  - event: "round_started"
    description: "Round is now active; gameplay begins"
    payload:
      game_id: "string"
      round_number: "integer"
      guesser_id: "string"
      guesser_name: "string"
      category: "string"
      status: "round_active"

  - event: "word_shown"
    description: "Current word; sent ONLY to clue-givers via send_to_user, never to the guesser"
    payload:
      word: "string"
      guesser_id: "string"

  - event: "guess_submitted"
    description: "Guesser submitted a guess (shown to clue-givers for judging)"
    payload:
      user_id: "string"
      display_name: "string"
      guess: "string"

  - event: "score_updated"
    description: "A guess was judged correct; scores updated and the word revealed to all"
    payload:
      scores: { "user_id": "integer" }
      user_id: "string"
      word: "string"

  - event: "timer_tick"
    description: "Round timer update"
    payload:
      remaining: "integer"

  - event: "category_overview"
    description: "Sent between rounds with the upcoming round's categories"
    payload:
      categories: [{ name: "string" }]
      guesser_id: "string"
      guesser_name: "string"

  - event: "round_ended"
    description: "Round has ended"
    payload:
      round_number: "integer"
      guesser_name: "string"
      points_earned: "integer"
      reason: "time_expired | all_words_guessed | guesser_disconnected"

  - event: "game_ended"
    description: "Game is over; clients render results then redirect to the dashboard"
    payload:
      winners: [{ id: "string", display_name: "string", total_points: "integer" }]
      scores: [{ display_name: "string", total_points: "integer" }]

  - event: "error"
    description: "Error message"
    payload:
      message: "string"
      code: "string"

  - event: "game_in_progress"
    description: "Sent to users who connect while a game is active"
    payload:
      message: "Game in progress. Please wait."
