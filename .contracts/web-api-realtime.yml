# BOOTSTRAP contract — derived from .copilot/topology.md request flow:
#   WS /ws/* → WAF (:443) → word-game-api (:8000)
# Real-time channel that broadcasts game-state changes to all connected participants so
# the distributed multiplayer game stays in sync. Greenfield at bootstrap — intended shape.
name: "web-api-realtime"
type: "Event"
transport: "WebSocket"
provider: "word-game-api"
consumers:
  - "word-game-web"
auth: "Bearer JWT passed on connect (query param or subprotocol) — Entra External ID"
endpoints:
  - method: "WS"
    path: "/ws/game"
    description: "Connect to receive live updates for the single active game."
    # Server → client messages (envelope: { type, payload })
    server_events:
      - type: "player_joined"
        payload: { player_id: "string", display_name: "string", role: "string" }
      - type: "game_started"
        payload: { game_id: "string", phase: "string" }
      - type: "clue_added"
        payload: { player_id: "string", clue_count: "integer" }
      - type: "guess_made"
        payload: { player_id: "string", correct: "boolean" }
      - type: "gathering_categories"
        payload: { game_id: "string" }                 # shown while the agent works
      - type: "category_overview"
        payload: { game_id: "string", categories: "array" }  # [{ name }] one per player
      - type: "round_started"
        payload: { game_id: "string", round: "integer", roles: "array" }  # [{ player_id, role }]
      - type: "role_assigned"
        payload: { player_id: "string", role: "string" }   # 'guesser' | 'clue_giver'
      - type: "countdown"
        payload: { seconds: "integer" }               # 10..0 shared countdown
      - type: "word_set"
        # Sent to CLUE-GIVERS ONLY. The guesser NEVER receives the secret word (server-enforced).
        payload: { word: "string", category: "string" }
      - type: "guess_judged"
        payload: { player_id: "string", correct: "boolean", points_awarded: "integer" }
      - type: "word_reveal"
        payload: { word: "string", seconds: "integer" }   # solved word shown to guesser for 3s
      - type: "score_update"
        payload: { scores: "array" }                  # [{ player_id, display_name, score }]
      - type: "round_over"
        payload: { game_id: "string", round: "integer" }
      - type: "game_over"
        payload: { game_id: "string", winners: "array" }  # [{ player_id, display_name, score }]
      - type: "game_in_progress"
        payload: {}                                    # late joiner: 'Game in progress. Please wait.'
      - type: "state_sync"
        payload: { game_id: "string", status: "string", phase: "string", players: "array", round: "integer" }
    # Client → server messages
    client_events:
      - type: "ping"
        payload: {}
      - type: "subscribe"
        payload: { game_id: "string" }
