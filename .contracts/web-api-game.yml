# BOOTSTRAP contract — derived from .copilot/topology.md (request flow, conventions)
# and init-pattern.yml (app_description). Child repos are greenfield/empty at bootstrap
# time, so these represent the INTENDED cross-repo shapes for specialists to implement
# and refine. Conventions: snake_case request/response bodies; JWT bearer auth on /api/*;
# validation errors return 422 {error, field}.
name: "web-api-game"
type: "REST"
provider: "word-game-api"
consumers:
  - "word-game-web"
auth: "Bearer JWT (Entra External ID) — scope api://<api-client-id>/access_as_user"
notes: >
  Single active game globally (only one game at a time in the entire system). Anyone
  loading the site before a game starts can join. Roles: one guesser, the rest are
  clue-givers. State is authoritative in the API (persisted to Cosmos DB).
endpoints:
  - method: "GET"
    path: "/health"
    auth: false
    description: "Container liveness/readiness probe (not routed through the WAF)."
    request: {}
    response:
      200: { status: "string" }

  - method: "GET"
    path: "/api/health"
    auth: false
    description: >
      WAF-reachable, UNAUTHENTICATED health probe used by the SPA landing page. The WAF proxies
      /api/* to the api, and JWTMiddleware MUST exempt exactly this path. Everything else under
      /api/* still requires a valid bearer token.
    request: {}
    response:
      200: { status: "string" }

  - method: "GET"
    path: "/api/game"
    request: {}
    response:
      200:
        game_id: "string"
        status: "string"          # lobby | active | finished
        phase: "string"           # clue | guess | over
        players: "array"          # [{ player_id, display_name, role }]
        clues: "array"            # [{ player_id, clue }] (hidden from guesser until reveal)
        active_game: "boolean"
      401: { error: "string" }

  - method: "POST"
    path: "/api/game/join"
    request:
      display_name: { type: "string", required: false }
    response:
      200: { player_id: "string", game_id: "string", role: "string" }
      409: { error: "string" }    # game already started; joining is closed
      422: { error: "string", field: "string" }

  - method: "POST"
    path: "/api/game/start"
    request: {}
    response:
      200: { game_id: "string", status: "string", phase: "string" }
      409: { error: "string" }    # a game is already active
      422: { error: "string", field: "string" }

  - method: "POST"
    path: "/api/game/clue"
    request:
      clue: { type: "string", required: true }
    response:
      200: { accepted: "boolean", clue_count: "integer" }
      403: { error: "string" }    # not a clue-giver
      422: { error: "string", field: "string" }  # invalid/too-revealing clue

  - method: "POST"
    path: "/api/game/guess"
    request:
      guess: { type: "string", required: true }
    response:
      200: { correct: "boolean", status: "string", phase: "string" }
      403: { error: "string" }    # not the guesser
      422: { error: "string", field: "string" }

  - method: "GET"
    path: "/api/game/players"
    request: {}
    response:
      200: { players: "array" }   # [{ player_id, display_name, role }]
      401: { error: "string" }

  - method: "POST"
    path: "/api/game/leave"
    request: {}
    response:
      200: { left: "boolean" }
      401: { error: "string" }

  # --- Identity, presence & dashboard (Sprint 2) ---
  - method: "GET"
    path: "/api/me"
    description: "Current authenticated user's profile (identity keyed by sub claim)."
    request: {}
    response:
      200: { player_id: "string", display_name: "string", has_name: "boolean" }
      401: { error: "string" }

  - method: "POST"
    path: "/api/users/name"
    description: "Claim a display name on first visit. Distinguish malformed (422) from taken (409)."
    request:
      display_name: { type: "string", required: true }   # short alphanumeric
    response:
      200: { player_id: "string", display_name: "string" }
      409: { error: "string" }                 # 'that name is taken'
      422: { error: "string", field: "string" } # malformed name
      401: { error: "string" }

  - method: "PUT"
    path: "/api/users/name"
    description: "Change display name later from the profile screen (same rules)."
    request:
      display_name: { type: "string", required: true }
    response:
      200: { player_id: "string", display_name: "string" }
      409: { error: "string" }
      422: { error: "string", field: "string" }
      401: { error: "string" }

  - method: "GET"
    path: "/api/users/active"
    description: "All currently-active users (presence-backed). Field name is active_users (not users)."
    request: {}
    response:
      200: { active_users: "array", count: "integer" }   # active_users: [{ player_id, display_name }]
      401: { error: "string" }

  - method: "GET"
    path: "/api/categories/config"
    description: "Read the configurable website list used for category generation."
    request: {}
    response:
      200: { websites: "array" }   # [string] URLs
      401: { error: "string" }

  - method: "PUT"
    path: "/api/categories/config"
    description: "Update the website list. Saving must NOT block the user (async persistence)."
    request:
      websites: { type: "array", required: true }   # [string] URLs (validated: http/https only, SSRF-safe)
    response:
      200: { websites: "array", status: "string" }   # status: "accepted" (async persistence)
      422: { error: "string", field: "string" }
      401: { error: "string" }

  - method: "GET"
    path: "/api/dashboard"
    description: "Aggregated dashboard data."
    request: {}
    response:
      200:
        games_played: "integer"              # total games ever played
        top_all_time: "array"                # [{ display_name, score }] up to 10
        top_today: "array"                   # [{ display_name, score }] up to 3
        active_users: "array"                # [{ player_id, display_name }]
        last_winners: "array"                # [{ display_name, score }] for status bar (may be empty)
      401: { error: "string" }
