feature: "user-management"
context: "Users must register with unique display names before seeing the dashboard"
acceptance:
  - scenario: "New user sets display name"
    given: "A user visits the app for the first time (authenticated via Entra)"
    when: "They enter a display name"
    then: "Name is validated for uniqueness, saved to Cosmos DB, user sees dashboard"
  - scenario: "Duplicate name rejected"
    given: "Another user already has the chosen name"
    when: "User submits that name"
    then: "User sees 'that name is taken' and must choose another"
  - scenario: "Active users displayed"
    given: "Multiple users are connected"
    when: "Any user views the dashboard"
    then: "All active (connected) user names are displayed"
  - scenario: "User joins during active game"
    given: "A game is currently in progress"
    when: "A new user connects"
    then: "User sees 'Game in progress. Please wait.' and polls until eligible"
nfr:
  latency: "< 500ms for name check"
  security: "Entra External ID authentication required; sub claim as user ID"
affected_repos:
  - repo: "word-game-api"
    scope: "User registration endpoints, WebSocket user tracking, Cosmos DB user container"
  - repo: "word-game-web"
    scope: "Name entry UI, active users display, game-in-progress blocking"
  - repo: "word-game-infra"
    scope: "Cosmos DB users container"
