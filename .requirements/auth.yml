feature: "auth"
context: "Entra External ID authentication for the word game"
acceptance:
  - scenario: "Public landing page"
    given: "User visits the application URL"
    when: "Not authenticated"
    then: "User sees a landing page with login/signup button; no game content exposed"
  - scenario: "Self-service signup"
    given: "User clicks login/signup"
    when: "User has no account"
    then: "Entra-hosted sign-up flow collects email, verifies via OTP, creates account"
  - scenario: "Returning user login"
    given: "User clicks login/signup"
    when: "User has an existing account"
    then: "Entra sign-in flow authenticates user, returns tokens to SPA"
  - scenario: "Token validation"
    given: "SPA sends request to API"
    when: "API receives the request"
    then: "API validates JWT (issuer, audience, expiry, nbf, scopes); rejects invalid tokens with 401"
  - scenario: "Profile creation"
    given: "User authenticates for the first time"
    when: "App checks for existing profile"
    then: "User is directed to set a display name (profile creation flow)"
  - scenario: "MSAL configuration"
    given: "SPA is loaded"
    when: "Auth is initialized"
    then: "MSAL uses PKCE flow, sessionStorage cache, hardcoded redirect URIs"
nfr:
  security: "PKCE auth flow, sessionStorage tokens, CORS restricted to known origins, CSP prevents inline scripts"
affected_repos:
  - repo: "word-game-web"
    scope: "MSAL config, AuthProvider, landing page, protected routes, profile creation"
  - repo: "word-game-api"
    scope: "JWT middleware, token validation, profile endpoint"
  - repo: "word-game-infra"
    scope: "Entra External ID app registrations (web + API), user flows"
