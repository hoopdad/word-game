feature: "game-rounds"
context: "Core gameplay: timed rounds with guesser/clue-giver roles, word guessing, scoring"
acceptance:
  - scenario: "Gathering categories phase"
    given: "A user clicked start game"
    when: "The category agent is generating categories"
    then: "All users see 'gathering categories' screen"
  - scenario: "Category overview"
    given: "Categories are generated (1 per user)"
    when: "Categories are ready"
    then: "All users see category overview; a button starts the first round"
  - scenario: "Role assignment"
    given: "A round is starting"
    when: "Roles are assigned randomly"
    then: "Exactly one user is guesser, all others are clue-givers; all see their role"
  - scenario: "Countdown"
    given: "Roles are assigned"
    when: "Round countdown begins"
    then: "All users see a countdown from 10 seconds to 0"
  - scenario: "Clue-givers see word"
    given: "Round is active (2-minute timer running)"
    when: "A word is shown"
    then: "Clue-givers see the word on screen; guesser does NOT see the word"
  - scenario: "Correct guess"
    given: "Guesser submits a guess"
    when: "Any clue-giver judges it as correct"
    then: "Guesser sees the word for 3 seconds, gets 10 points, next word shown to clue-givers"
  - scenario: "Between correct guess and next word"
    given: "A correct guess was just judged"
    when: "The 3-second reveal is active"
    then: "Clue-givers see the next word, guesser's word display clears after 3 seconds"
  - scenario: "Time expires"
    given: "Round 2-minute timer is running"
    when: "Timer reaches 0 without a correct guess"
    then: "0 points awarded, round ends"
  - scenario: "Round end scoring"
    given: "A round has ended"
    when: "Scores are calculated"
    then: "Scores are saved to Cosmos DB"
  - scenario: "Next guesser selection"
    given: "A round has ended"
    when: "Not all users have been guessers yet"
    then: "System randomly picks a user who hasn't been guesser; new round starts"
  - scenario: "Game end"
    given: "All users have been guessers"
    when: "The last round ends"
    then: "Game ends, winner(s) displayed (highest points), high scores updated if beaten"
  - scenario: "Single game constraint"
    given: "The system"
    when: "At any time"
    then: "Only one game is active in the entire system"
nfr:
  latency: "< 200ms for guess submission and judgment"
  security: "All game state managed server-side; client cannot manipulate scores"
affected_repos:
  - repo: "word-game-api"
    scope: "Game state machine, round management, WebSocket game events, scoring logic, timer management"
  - repo: "word-game-web"
    scope: "Game screens: gathering, category overview, round play, countdown, scoring, results"
  - repo: "word-game-infra"
    scope: "Cosmos DB games and scores containers"
