feature: "game-engine"
context: "Sprint 3 — the live multiplayer game: single global game, category generation by the Foundry agent, rounds with random roles, real-time sync, scoring, guesser rotation, winners, and post-game reset."

acceptance:
  - scenario: "Single global game + start includes everyone"
    given: "users on the dashboard"
    when: "any user clicks Start game"
    then: "exactly one game exists system-wide (enforced via a Cosmos singleton + ETag optimistic concurrency); every connected client moves into the game together; late joiners see 'Game in progress. Please wait.' and poll until eligible."

  - scenario: "Gathering categories + one category per player"
    given: "a game is starting"
    when: "the category agent runs"
    then: "the UI shows a 'gathering categories' state while the agent works; the agent reads the configurable website list (editable via 'Configure categories'), visits sites in parallel, and derives categories/2-3-word phrases (excluding generic standalone words); there is one category per player; generation is bounded to a 30s hard timeout with a sensible default-category fallback, and saving the category config never blocks the user."

  - scenario: "Category overview then first round"
    given: "categories are ready"
    when: "the overview screen is shown (one category per player)"
    then: "a control on that view starts the first round."

  - scenario: "Role assignment + countdown"
    given: "the start of every round"
    when: "roles are assigned"
    then: "roles are random — exactly one guesser, everyone else clue-givers; each player sees their role, then a shared 10-second countdown."

  - scenario: "Round mechanics, secrecy, and scoring"
    given: "an active 2-minute round"
    when: "play proceeds"
    then: "clue-givers see the secret word; the guesser NEVER receives it (enforced server-side); when any clue-giver judges the guess correct, award 10 points and show the solved word to the guesser for 3 seconds; during that transition clue-givers see the next secret word while the guesser sees none (also enforced server-side); if 2 minutes expire with no correct guess, award 0 and end the round."

  - scenario: "Rotation + game end + winners + high scores"
    given: "a round ends"
    when: "the score is saved to Cosmos"
    then: "the system randomly picks a player who has not yet been guesser; when everyone has guessed, the game ends; winners (most points that game) are shown; all-time and today's high scores update if beaten."

  - scenario: "Real-time behavior + rejoin"
    given: "live gameplay"
    when: "state changes (roles, countdown, current word, guesses, judgments, scores, transitions, game-over)"
    then: "updates reach clients promptly over WebSocket (/ws/game) authorized via a short-lived ticket (no bearer in URL) without manual refresh; a reloading player rejoins in the correct state; disconnected players are handled gracefully (reconnect window, skip/forfeit a disconnected guesser)."

  - scenario: "Post-game reset"
    given: "a finished game"
    when: "the game ends"
    then: "the dashboard returns to pre-game state and a status bar celebrates the previous winner(s)."

nfr:
  latency: "real-time event fan-out < 250ms; agent category generation hard-capped at 30s"
  security: "server-side authorization of every action by role + game state; guesser word secrecy server-enforced; SSRF guards on agent URL fetch (scheme/host/IP allowlist, size/time bounds); WS auth via ticket"
  data: "live game state, round history, scores, category_config durable in Cosmos; single-game invariant via ETag"

affected_repos:
  - repo: "word-game-api"
    scope: "Game lifecycle, WS /ws/game (ticket auth), roles, rounds, scoring, secrecy enforcement, rotation, winners, high-score updates, single-game enforcement, category_config store + gathering orchestration."
  - repo: "word-game-agent"
    scope: "Foundry category generation (parallel scrape, extraction rules, one category/player, SSRF guards, 30s timeout + default fallback); generate-word/evaluate-guess/score-clue."
  - repo: "word-game-web"
    scope: "Game screens (gathering, overview, role reveal + countdown, round play clue/guess, 3s reveal, winners, reset + status bar), WS client, late-join wait, rejoin."
