feature: "infrastructure"
context: "All Azure infrastructure for the word game platform"
acceptance:
  - scenario: "Networking"
    given: "Terraform is applied"
    when: "Infrastructure is provisioned"
    then: "VNet with spoke topology, private endpoints, NSGs, internal Container Apps environment"
  - scenario: "Container Apps"
    given: "Infrastructure is provisioned"
    when: "Services are deployed"
    then: "Three Container Apps (web, api, agent) running on consumption plan with VNet integration"
  - scenario: "Cosmos DB"
    given: "Infrastructure is provisioned"
    when: "Database is ready"
    then: "Cosmos DB NoSQL serverless with containers: users, games, scores, category_config"
  - scenario: "AI Foundry"
    given: "Infrastructure is provisioned"
    when: "Agent service needs AI"
    then: "Azure AI Foundry project with GPT-4.1-mini (or higher) deployment available"
  - scenario: "Identity"
    given: "Infrastructure is provisioned"
    when: "Services authenticate"
    then: "User-assigned managed identity with appropriate RBAC roles for Cosmos, ACR, Key Vault, Foundry"
  - scenario: "Monitoring"
    given: "Infrastructure is provisioned"
    when: "Services emit logs"
    then: "Log Analytics workspace receives structured logs with daily cap"
  - scenario: "Region"
    given: "All resources"
    when: "Provisioned"
    then: "All resources deployed in Central US"
  - scenario: "Private networking"
    given: "spoke-skill used to scaffold networking"
    when: "Terraform is applied"
    then: "No private DNS zones in spoke (only in hub); private endpoints for Cosmos, Key Vault, ACR"
nfr:
  security: "Private networking, managed identities, no public endpoints except WAF ingress"
  cost: "Serverless/consumption tier for all services, scale-to-zero for non-prod"
affected_repos:
  - repo: "word-game-infra"
    scope: "Complete Terraform configuration"
