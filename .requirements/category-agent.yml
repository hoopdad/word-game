feature: "category-agent"
context: "AI agent generates word categories from configurable web pages"
acceptance:
  - scenario: "Category generation from web pages"
    given: "Category config contains a list of URLs"
    when: "The category agent is triggered"
    then: "Agent connects to all URLs in parallel, reads content, generates categories"
  - scenario: "Category quality"
    given: "Agent reads a web page about a topic"
    when: "It extracts categories and words"
    then: "Categories are specific (not generic), words are domain-specific (no articles/prepositions as standalone), phrases up to 2-3 words allowed"
  - scenario: "Category count"
    given: "A game is starting with N users"
    when: "Categories are generated"
    then: "At least N categories are produced (one per user)"
  - scenario: "Configuration management"
    given: "Dashboard has a 'configure categories' link"
    when: "User clicks it"
    then: "User can view, add, remove URLs from the category source configuration"
  - scenario: "Configuration persistence"
    given: "User updates category configuration"
    when: "The changes are saved"
    then: "Configuration is persisted in Cosmos DB and used for the next game"
  - scenario: "Example category extraction"
    given: "URL https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-highlyavailable"
    when: "Agent processes this URL"
    then: "Extracts words like 'highly available', 'VPN', 'VPN Gateway', 'S2S VPN' grouped into a relevant category"
nfr:
  latency: "< 30s for full category generation"
  security: "Agent must validate URLs before fetching; no SSRF to internal resources"
affected_repos:
  - repo: "word-game-agent"
    scope: "Category generation agent using Foundry, web scraping, NLP extraction"
  - repo: "word-game-api"
    scope: "Category config CRUD endpoints, agent trigger endpoint"
  - repo: "word-game-infra"
    scope: "Azure AI Foundry project + model deployment, Cosmos DB category_config container"
