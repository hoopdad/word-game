feature: "real-foundry-client"
context: "Replace the mock word-game-agent Foundry client with a real Azure AI Foundry-backed implementation on feature/azd-deploy"
acceptance:
  - scenario: "Using the Microsoft Agent Framework client when available"
    given: "The installed agent-framework package exposes agent_framework.foundry.FoundryChatClient"
    when: "The word-game-agent service initializes its Foundry integration"
    then: "It uses agent_framework.foundry.FoundryChatClient with managed identity auth instead of a mock or hardcoded categories"
  - scenario: "Connecting to the deployed Foundry model"
    given: "AZURE_FOUNDRY_URL, AZURE_CLIENT_ID, and the gpt-41-mini deployment are configured"
    when: "Category extraction runs"
    then: "The service calls the Azure AI Foundry chat completion API at https://wordgamedevfoundry.cognitiveservices.azure.com/ using managed identity"
  - scenario: "Returning structured category output"
    given: "The model responds with category extraction results"
    when: "FoundryClient.extract_categories processes the response"
    then: "It returns structured categories with a name and a list of related words suitable for CategoryGenerator"
  - scenario: "Retrying and timing out safely"
    given: "Foundry requests encounter transient failures or slow responses"
    when: "The client calls the model"
    then: "It applies exponential backoff using foundry_max_retries/foundry_retry_backoff, enforces the 30-second generation timeout, and degrades gracefully on errors"
  - scenario: "Maintaining regression coverage"
    given: "The Foundry client implementation changes from mock behavior to real SDK integration"
    when: "Tests run"
    then: "The test suite mocks the new Foundry/Azure client boundary and covers success, retry, timeout, and graceful fallback behavior"
nfr:
  latency: "<= 30s total generation timeout"
  security: "Managed identity only via AZURE_CLIENT_ID; no API keys or secrets committed"
affected_repos:
  - repo: "word-game-agent"
    scope: "Foundry client implementation, configuration, dependencies, and regression tests"
