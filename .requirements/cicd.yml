feature: "cicd"
context: "Local azd deployment model replaces GitHub Actions CI/CD across the project"
acceptance:
  - scenario: "Local validation before deployment"
    given: "An operator deploys from word-game-harness"
    when: "The local deployment workflow starts"
    then: "Lint, security scan, tests, and image build verification run locally in fail-fast order before azd up continues"
  - scenario: "Local infra apply"
    given: "word-game-infra changes are part of a deployment"
    when: "azd up orchestrates infrastructure"
    then: "Terraform plan/apply runs locally with local state files and no GitHub OIDC dependencies"
  - scenario: "Local service image build and push"
    given: "web, api, agent, or waf changes are deployed"
    when: "The local deployment workflow builds artifacts"
    then: "Container images are built and pushed to ACR via az acr build using :sha and :latest tags"
  - scenario: "Deployment ordering"
    given: "A full environment deployment"
    when: "word-game-harness runs azd up"
    then: "Infrastructure deploys before service rollouts"
  - scenario: "GitHub Actions removal"
    given: "The project repositories on feature/azd-deploy"
    when: "CI/CD vestiges are removed"
    then: "Child repos no longer contain GitHub Actions ci.yml/cd.yml workflows and infra no longer contains GitHub OIDC federation resources or variables"
nfr:
  security: "Managed identity remains for runtime access; no GitHub OIDC federation; Trivy image scanning and local validation stay required"
  latency: "Local validation remains fail-fast; local azd deploy targets end-to-end completion within existing developer workflow expectations"
affected_repos:
  - repo: "word-game-harness"
    scope: "Guardrails, pattern definition, and deployment requirement updated for local azd orchestration"
  - repo: "word-game-web"
    scope: "Remove GitHub Actions workflow files"
  - repo: "word-game-api"
    scope: "Remove GitHub Actions workflow files"
  - repo: "word-game-agent"
    scope: "Remove GitHub Actions workflow files"
  - repo: "word-game-waf"
    scope: "Remove GitHub Actions workflow files"
  - repo: "word-game-infra"
    scope: "Remove GitHub OIDC federation leftovers while preserving managed-identity runtime role assignments"
