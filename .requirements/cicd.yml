feature: "cicd"
context: "GitHub Actions CI/CD for all repos"
acceptance:
  - scenario: "CI pipeline"
    given: "Code is pushed to any repo"
    when: "CI workflow triggers"
    then: "Lint, security scan, tests, and build run on self-hosted runner; fail fast on lint errors"
  - scenario: "CD pipeline — infra"
    given: "CI passes on main branch for word-game-infra"
    when: "CD triggers"
    then: "Terraform plan + apply runs with OIDC auth; infra deploys before services"
  - scenario: "CD pipeline — services"
    given: "CI passes on main branch for web/api/agent"
    when: "CD triggers"
    then: "Docker image built (multi-stage), pushed to ACR with :sha and :latest tags, Container App updated"
  - scenario: "CD pipeline — WAF"
    given: "CI passes on main for word-game-waf"
    when: "CD triggers"
    then: "WAF container image built, pushed to ACR, Container App updated"
  - scenario: "OIDC authentication"
    given: "Any CD workflow"
    when: "Authenticating to Azure"
    then: "Uses GitHub OIDC federation (no stored credentials)"
  - scenario: "Self-hosted runners"
    given: "Any CI/CD workflow"
    when: "Jobs execute"
    then: "All jobs run on self-hosted runners (never GitHub-hosted)"
  - scenario: "Dependency ordering"
    given: "Full deployment"
    when: "All CD workflows run"
    then: "Infrastructure deploys successfully before web, api, agent, and waf"
nfr:
  security: "OIDC federation only; no secrets stored in GitHub; Trivy image scanning"
  latency: "CI < 5min, CD < 15min"
affected_repos:
  - repo: "word-game-web"
    scope: "CI workflow (lint, test, build), CD workflow (docker build, ACR push, ACA deploy)"
  - repo: "word-game-api"
    scope: "CI workflow (ruff, pytest), CD workflow (docker build, ACR push, ACA deploy)"
  - repo: "word-game-agent"
    scope: "CI workflow (ruff, pytest), CD workflow (docker build, ACR push, ACA deploy)"
  - repo: "word-game-infra"
    scope: "CI workflow (terraform fmt, validate), CD workflow (terraform plan, apply)"
  - repo: "word-game-waf"
    scope: "CI workflow (config validation), CD workflow (docker build, ACR push, ACA deploy)"
