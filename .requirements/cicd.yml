feature: "cicd"
context: "word-game-harness now owns local azd deployment for the full stack on feature/azd-deploy"
acceptance:
  - scenario: "Full local deployment"
    given: "An operator is authenticated locally with az login in word-game-harness"
    when: "They run azd up"
    then: "word-game-harness orchestrates the full deployment end-to-end with no GitHub Actions, OIDC federation, or self-hosted runners"
  - scenario: "Infra-only deployment"
    given: "Infrastructure changes are ready to apply"
    when: "The operator runs azd provision"
    then: "Terraform runs locally with local state files before any service deployment starts"
  - scenario: "Service-only deployment"
    given: "Infrastructure is already provisioned"
    when: "The operator runs bash scripts/azd-deploy.sh"
    then: "Services deploy in order api, agent, web, waf and each container image is built via az acr build"
  - scenario: "Deterministic deployment order"
    given: "A full environment deployment is requested"
    when: "The local deployment workflow executes"
    then: "Deploy order is infra (terraform) → api → agent → web → waf"
nfr:
  security: "Azure access uses local az login, Terraform state stays local, and no GitHub-hosted or self-hosted CI/CD identity path remains"
  latency: "azd provision and scripts/azd-deploy.sh complete within a single local operator workflow"
affected_repos:
  - repo: "word-game-harness"
    scope: "Own the local azd entrypoints, deployment sequencing, and operator documentation"
  - repo: "word-game-infra"
    scope: "Provision shared Azure infrastructure locally with Terraform and local state files"
  - repo: "word-game-api"
    scope: "Deploy after infra using az acr build-driven image promotion"
  - repo: "word-game-agent"
    scope: "Deploy after api using az acr build-driven image promotion"
  - repo: "word-game-web"
    scope: "Deploy after agent using az acr build-driven image promotion"
  - repo: "word-game-waf"
    scope: "Deploy last after web using the local azd-orchestrated service rollout"
