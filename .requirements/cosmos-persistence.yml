feature: "cosmos-persistence"
context: "All API stores are in-memory; data is lost on container restart. Cosmos DB infrastructure exists but API never connects. User display names, category configs, and scores must survive restarts."
acceptance:
  - scenario: "User registration persists"
    given: "A user registers with display_name 'hoopdad'"
    when: "The API container restarts"
    then: "The user's display_name is still retrievable from Cosmos DB; active users shows 'hoopdad' not the Entra object ID"
  - scenario: "Category config persists"
    given: "A user saves 3 category URLs"
    when: "The API container restarts and user re-opens category config"
    then: "All 3 URLs are displayed from Cosmos DB storage"
  - scenario: "Category save is fast"
    given: "A user clicks save on category config with URLs"
    when: "The system processes the save"
    then: "URLs are saved to Cosmos DB immediately (< 2s); agent generation runs asynchronously; frontend navigates back to dashboard without waiting for agent"
  - scenario: "Profile page exists"
    given: "A registered user is on the dashboard"
    when: "They navigate to their profile"
    then: "They can change their display_name using the same validation rules as initial registration (2-20 chars, alphanumeric + spaces, unique)"
  - scenario: "Cosmos DB client initialization"
    given: "API container starts with COSMOS_ENDPOINT and COSMOS_DATABASE_NAME env vars"
    when: "The app initializes"
    then: "CosmosClient connects using DefaultAzureCredential with managed_identity_client_id from AZURE_CLIENT_ID"
  - scenario: "Diagnostic query endpoint"
    given: "An authenticated admin user"
    when: "They call GET /api/admin/cosmos-query with container and query params"
    then: "System returns read-only query results from Cosmos DB (SELECT queries only)"
nfr:
  latency: "< 500ms for user lookup; < 2s for category save (excluding agent generation)"
  security: "Cosmos accessed via managed identity RBAC; no key-based auth; admin endpoint restricted"
  availability: "Data survives container restarts (Cosmos is durable store)"
affected_repos:
  - repo: "word-game-api"
    scope: "Add Cosmos client, refactor UserStore/CategoryConfigStore to Cosmos-backed, add profile endpoint, add admin query endpoint, fix category save to be async"
  - repo: "word-game-web"
    scope: "Add Profile page with username change, fix CategoryConfig loading/save UX"
