feature: "game-lobby"
context: "Dashboard serves as game lobby showing stats, players, and game controls"
acceptance:
  - scenario: "Dashboard displays active users"
    given: "User has set a display name"
    when: "User views the dashboard"
    then: "Names of all active (connected) users are listed"
  - scenario: "Game count shown"
    given: "Games have been played in the system"
    when: "User views dashboard"
    then: "Total count of all games ever played is displayed"
  - scenario: "All-time top 10 shown"
    given: "Scores exist in the database"
    when: "User views dashboard"
    then: "Top 10 highest scoring players of all time are displayed"
  - scenario: "Today's top 3 shown"
    given: "Games have been played today"
    when: "User views dashboard"
    then: "Top 3 highest scoring players of today are displayed"
  - scenario: "Start game button"
    given: "No game is in progress"
    when: "Any user clicks the start game button"
    then: "A game begins and all currently connected users are included"
  - scenario: "Configure categories link"
    given: "User is on the dashboard"
    when: "User clicks 'configure categories'"
    then: "Category configuration page is shown with editable URL list"
  - scenario: "Post-game celebration"
    given: "A game has just ended"
    when: "Dashboard resets to pre-game mode"
    then: "A status bar celebrates the winner(s) of the last game"
nfr:
  latency: "< 1s dashboard load"
  security: "Authenticated users only; real-time updates via WebSocket"
affected_repos:
  - repo: "word-game-api"
    scope: "Game status, scores, game-count endpoints; WebSocket events for user presence"
  - repo: "word-game-web"
    scope: "Dashboard UI, score cards, active user list, start game button, category config page"
  - repo: "word-game-infra"
    scope: "Cosmos DB scores and games containers"
