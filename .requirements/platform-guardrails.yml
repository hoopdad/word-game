# Binding platform guardrails for the word-game fleet.
# pattern_constraints are BINDING for child specialists. Do not contradict
# .copilot/guardrails/pattern.yml, nfr.yml, .contracts/*.yml, or system-requirements.md.
name: "platform-guardrails"
context: "Cross-repo binding constraints for the azure-fullstack pattern (word-game)."

global_constraints:
  region: "centralus"
  versioning: "Semantic versioning starting at 0.1.0; expose /version (and /health) on every service; web shows version next to app name."
  containers: "Multi-stage Docker builds; run as non-root; min 1 replica in prod (web+waf pin min_replicas=1)."
  auth: "Entra External ID (CIAM). SPA uses MSAL PKCE, acquireTokenPopup (never redirect), tokens in sessionStorage. API validates JWT v2.0 (iss/aud/exp/nbf/scope access_as_user) -> 401 on failure; identify users by 'sub' claim, not email."
  data: "Cosmos DB serverless, Session consistency. ALL persistence uses Cosmos in dev and prod; NEVER in-memory. Partition keys designed for access patterns."
  secrets: "No secrets in source/code. Use managed identity for all service-to-service and service-to-Azure access. Key Vault (RBAC: Key Vault Secrets User) for required secrets."
  api_conventions: "snake_case request/response bodies. Validation errors -> 422 {error, field}. Auth failures -> 401. Authorization failures -> 403. GET /health unauthenticated."
  networking: "Zero-trust standalone spoke VNet, deny-by-default NSGs. All resources private; ONLY the WAF container app is public. Private endpoints + private DNS. Private DNS zones in HUB only (never in spoke). TLS 1.2+ terminated at WAF."
  quality_gates: "Local lint + SAST (semgrep/bandit) + IaC scan (checkov) + image scan (trivy HIGH/CRITICAL fail) + unit tests + build must pass before handoff. Do not commit/push uncommitted secrets."

pattern_constraints:
  word-game-infra:
    stack: "Terraform / azurerm / Azure Verified Modules (AVM-first; log native fallbacks in .decisions/log.md)"
    validate: "terraform fmt -check; terraform init -backend=false; terraform validate; checkov"
    must:
      - "AVM modules whenever possible; native azurerm only with a logged exception (VNet native is a documented exception)."
      - "Provision: spoke VNet + subnets (ingress, container-apps, private-endpoints, reserved) + zero-trust NSGs; ACR (public_network_access_enabled=true documented exception for az acr build); Cosmos DB serverless (Session); Key Vault; Log Analytics; Container App Environment(s) with internal-only (private) ingress; user-assigned managed identity (AcrPull + KV Secrets User + Cosmos SQL Data Contributor via cosmosdb_sql_role_assignment); Azure AI Foundry account + GPT-4.1-mini (or higher) model deployment (GlobalStandard SKU in centralus)."
      - "Do NOT create Container Apps for services in Terraform beyond the environment (apps are created/updated by scripts/azd-deploy.sh). Do NOT create Entra app registrations in Terraform (done via az CLI)."
      - "Private endpoints for Cosmos/KV/ACR; link to hub private DNS zones; DO NOT create private DNS zones in the spoke."
      - "Choose a spoke CIDR that does not collide with hub ranges (read ../mikeo-hub/cidr.yaml if available); /16 space."
      - "Expose all outputs the harness needs (RG, ACR login server, CAE id/name, Cosmos endpoint+db, KV uri, UAMI ids/clientId, Foundry endpoint + model deployment name, Log Analytics id)."
  word-game-api:
    stack: "Python 3.12 / FastAPI / Cosmos SDK (azure-cosmos + azure-identity.aio, aiohttp transport)"
    validate: "ruff check . ; pytest (target >=80% coverage)"
    must:
      - "Implement routes per .contracts/web-api-game.yml and .contracts/web-api-realtime.yml; refine shapes as the game flow requires and keep contracts aligned (coordinate contract changes)."
      - "All state persisted to Cosmos (users, games, scores, category_config, presence). Never in-memory."
      - "JWT validation middleware; WebSocket auth via short-lived ticket (no bearer in URL)."
      - "GET /health (unauth) and GET /version."
  word-game-web:
    stack: "TypeScript / React 18 / Vite / Vitest / Playwright"
    validate: "npm run lint ; npm run test ; npm run build"
    must:
      - "MSAL PKCE popup; redirectUri = window.location.origin + '/welcome' at RUNTIME (not a VITE_* var); tokens in sessionStorage."
      - "VITE_* build args must be ARG->ENV BEFORE npm run build in Dockerfile. Build with VITE_MSAL_API_CLIENT_ID (GUID), construct scope at runtime."
      - "Display version (0.1.0) next to the application name. Render user content safely (no XSS)."
      - "Call API/WS through the WAF-relative paths (/api/*, /ws/*)."
  word-game-agent:
    stack: "Python 3.11 / Microsoft Agent Framework (agent_framework.Agent + agent_framework.foundry.FoundryChatClient, managed identity)"
    validate: "ruff check . ; pytest"
    must:
      - "Implement endpoints per .contracts/agent-analysis.yml plus category generation for the game (one category per player)."
      - "SSRF guards on URL fetching (scheme/host/IP allowlist, DNS validation, bounded size + timeout)."
      - "30s hard timeout on category generation with a sensible default-category fallback."
      - "GET /agent/health (unauth) and GET /version."
  word-game-waf:
    stack: "Container / nginx + ModSecurity (OWASP CRS)"
    validate: "tests/validate-config.sh (nginx -t) ; ModSecurity CRS present"
    must:
      - "Single public ingress on 443 (TLS 1.2+). Route per .contracts/waf-ingress.yml."
      - "OWASP CRS blocking Top 10; exclude rule 911100 for /api/* (allow PUT/PATCH/DELETE); allow JSON bodies + WS upgrade for /ws/*."
      - "nginx map_hash_bucket_size = 128; min_replicas = 1; GET /health passthrough or local."

affected_repos:
  - repo: "word-game-infra"
    scope: "All Azure resources as code (AVM-first)."
  - repo: "word-game-api"
    scope: "REST + WebSocket game API, Cosmos persistence, JWT auth."
  - repo: "word-game-web"
    scope: "React SPA, MSAL auth, game UI."
  - repo: "word-game-agent"
    scope: "Foundry category agent + analysis endpoints."
  - repo: "word-game-waf"
    scope: "nginx + ModSecurity ingress."
